name: Playwright & Jest Tests
on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master, production]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Update Playwright Snapshots?"
        required: false
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      PORT: "7000"
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      CI: true

    steps:
      - uses: actions/checkout@v4
        with:
          # Required to allow the bot to push back to the branch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # --- CONDITIONAL JEST STEPS ---
      - name: Run Unit Tests
        run: |
          if [ -d "./tests/unit" ] || [ -d "./src/__tests__/unit" ]; then
            npm run test:unit
          else
            echo "Unit test folder not found. Skipping..."
          fi

      - name: Run Integration Tests
        run: |
          if [ -d "./tests/integration" ] || [ -d "./src/__tests__/integration" ]; then
            npm run test:integration
          else
            echo "Integration test folder not found. Skipping..."
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app
        run: npm run build

      # --- PLAYWRIGHT WITH CONDITIONAL LOGIC ---
      - name: Run Playwright tests
        id: playwright_check
        run: |
          SNAPSHOT_DIR="e2e/leetcode.spec.ts-snapshots"

          if [ "${{ github.event.inputs.update_snapshots }}" == "true" ]; then
            echo "🔄 Manual update requested..."
            npx playwright test --update-snapshots
            echo "PUSH_REQUIRED=true" >> $GITHUB_ENV
          elif [ ! -d "$SNAPSHOT_DIR" ]; then
            echo "🆕 Snapshots missing. Generating initial baselines..."
            npx playwright test --update-snapshots
            echo "PUSH_REQUIRED=true" >> $GITHUB_ENV
          else
            echo "✅ Snapshots found. Running standard visual regression..."
            npx playwright test
            echo "PUSH_REQUIRED=false" >> $GITHUB_ENV
          fi

      - name: Commit and Push Snapshots
        if: env.PUSH_REQUIRED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/leetcode.spec.ts-snapshots/*.png
          git commit -m "chore(ci): sync crawler snapshots [skip ci]" || echo "No changes"
          git push

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
