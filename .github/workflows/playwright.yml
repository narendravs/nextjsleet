name: Playwright & Jest Tests
on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master, production]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # 1. Define all your .env variables here so they are available to all steps
    env:
      PORT: "7000"
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      # --- STEPS FOR JEST (Conditional Run) ---
      - name: Run Unit Tests
        run: |
          if [ -d "./tests/unit" ] || [ -d "./src/__tests__/unit" ]; then
            npm run test:unit
          else
            echo "Unit test folder not found. Skipping step..."
          fi

      - name: Run Integration Tests
        run: |
          if [ -d "./tests/integration" ] || [ -d "./src/__tests__/integration" ]; then
            npm run test:integration
          else
            echo "Integration test folder not found. Skipping step..."
          fi

      # --- PLAYWRIGHT STEPS ---
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 2. YOU MUST BUILD THE APP BEFORE RUNNING TESTS
      - name: Build Next.js app
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
